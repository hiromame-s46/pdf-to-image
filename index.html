<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


    :root {
        --primary: #6366f1;
        --primary-dark: #4f46e5;
        --success: #10b981;
        --danger: #ef4444;
        --bg-dark: #0f172a;
        --bg-light: #f8fafc;
        --text-dark: #1e293b;
        --text-light: #64748b;
        --border: #e2e8f0;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg-dark) 0%, #1e293b 100%);
        color: var(--text-dark);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 100%;
        max-width: 900px;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
    }

    .header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        padding: 40px 30px;
        text-align: center;
    }

    .header h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: -0.5px;
    }

    .header p {
        font-size: 1rem;
        opacity: 0.9;
    }

    .content {
        padding: 40px 30px;
    }

    .upload-section {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
        flex-wrap: wrap;
    }

    .upload-box {
        flex: 1;
        min-width: 200px;
        border: 3px dashed var(--border);
        border-radius: 12px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        background: var(--bg-light);
    }

    .upload-box:hover {
        border-color: var(--primary);
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.05), rgba(79, 70, 229, 0.05));
    }

    .upload-box.dragover {
        border-color: var(--primary);
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(79, 70, 229, 0.1));
        transform: scale(1.02);
    }

    .upload-icon {
        font-size: 3rem;
        margin-bottom: 15px;
    }

    .upload-box p {
        color: var(--text-light);
        margin-bottom: 10px;
        font-size: 0.95rem;
    }

    #pdfInput {
        display: none;
    }

    .btn {
        display: inline-block;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
        white-space: nowrap;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
    }

    .btn-primary:hover:not(:disabled) {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .btn-secondary {
        background: var(--bg-light);
        color: var(--text-dark);
        border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
        background: white;
        border-color: var(--primary);
        color: var(--primary);
    }

    .btn-danger {
        background: var(--danger);
        color: white;
        padding: 8px 16px;
        font-size: 0.85rem;
    }

    .btn-danger:hover {
        opacity: 0.9;
    }

    .btn-small {
        padding: 6px 12px;
        font-size: 0.8rem;
    }

    .controls {
        display: flex;
        gap: 15px;
        margin-bottom: 30px;
        flex-wrap: wrap;
        align-items: center;
    }

    .control-group {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
    }

    .control-group label {
        font-weight: 600;
        color: var(--text-dark);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .control-group input[type="number"],
    .control-group select {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 0.9rem;
        width: 100px;
    }

    .status-area {
        background: var(--bg-light);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
        display: none;
    }

    .status-area.show {
        display: block;
    }

    .progress-bar {
        width: 100%;
        height: 8px;
        background: var(--border);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 15px;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--primary-dark));
        width: 0%;
        transition: width 0.3s ease;
    }

    .status-text {
        font-size: 0.9rem;
        color: var(--text-light);
        margin-bottom: 10px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        margin-top: 30px;
    }

    .image-item {
        position: relative;
        background: var(--bg-light);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
        transition: all 0.3s ease;
        animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .image-item:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        border-color: var(--primary);
    }

    .image-preview {
        width: 100%;
        display: block;
        background: #f5f5f5;
        min-height: 250px;
        object-fit: contain;
    }

    .image-info {
        padding: 15px;
        background: white;
    }

    .page-number {
        font-weight: 600;
        color: var(--text-dark);
        font-size: 0.95rem;
        margin-bottom: 10px;
    }

    .image-size {
        font-size: 0.8rem;
        color: var(--text-light);
        margin-bottom: 12px;
    }

    .image-actions {
        display: flex;
        gap: 8px;
    }

    .btn-download {
        flex: 1;
        background: var(--success);
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-download:hover {
        background: #059669;
        transform: translateY(-1px);
    }

    .btn-copy {
        background: var(--primary);
        color: white;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-copy:hover {
        background: var(--primary-dark);
    }

    .error-message {
        background: #fee2e2;
        color: #991b1b;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 4px solid var(--danger);
    }

    .success-message {
        background: #d1fae5;
        color: #065f46;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        border-left: 4px solid var(--success);
    }

    .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: var(--text-light);
    }

    .empty-state-icon {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.5;
    }

    .download-all {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }

    .file-name {
        background: var(--primary);
        color: white;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        word-break: break-all;
        margin-bottom: 15px;
    }

    @media (max-width: 768px) {
        .header h1 {
            font-size: 1.8rem;
        }

        .content {
            padding: 25px 20px;
        }

        .upload-section {
            flex-direction: column;
        }

        .controls {
            flex-direction: column;
            align-items: flex-start;
        }

        .control-group {
            width: 100%;
        }

        .gallery {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .image-preview {
            min-height: 200px;
        }

        .btn {
            width: 100%;
        }
    }

    .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(99, 102, 241, 0.3);
        border-radius: 50%;
        border-top-color: var(--primary);
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
</style>


</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 PDF to Image</h1>
            <p>PDFをページごとに高品質な画像に変換</p>
        </div>


    <div class="content">
        <div id="errorMessage"></div>
        <div id="successMessage"></div>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📥</div>
                <p><strong>PDFファイルをドラッグ＆ドロップ</strong></p>
                <p style="font-size: 0.85rem; margin-bottom: 15px;">または下のボタンをクリック</p>
                <button class="btn btn-primary" id="selectBtn">ファイルを選択</button>
                <input type="file" id="pdfInput" accept=".pdf" />
            </div>
        </div>

        <div id="controlsSection" style="display: none;">
            <div class="file-name" id="fileName"></div>

            <div class="controls">
                <div class="control-group">
                    <label for="quality">品質:</label>
                    <select id="quality">
                        <option value="1">低 (高速)</option>
                        <option value="2" selected>中</option>
                        <option value="3">高</option>
                        <option value="4">最高</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="format">形式:</label>
                    <select id="format">
                        <option value="png" selected>PNG (推奨)</option>
                        <option value="jpg">JPEG (小容量)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="pages">ページ範囲:</label>
                    <input type="text" id="pages" placeholder="例: 1,2,5 または 1-5" title="カンマで区切るか、範囲を指定">
                </div>

                <div class="control-group">
                    <button class="btn btn-primary" id="convertBtn">変換開始</button>
                    <button class="btn btn-secondary" id="resetBtn">リセット</button>
                </div>
            </div>

            <div class="status-area" id="statusArea">
                <div class="status-text">変換中...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">0/0 ページ処理中...</div>
            </div>

            <div id="downloadAllSection" style="display: none;">
                <div class="download-all">
                    <button class="btn btn-primary" id="downloadAllBtn">すべてをZIPでダウンロード</button>
                </div>
            </div>

            <div id="gallery"></div>
        </div>

        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">🎨</div>
            <p>PDFファイルをアップロードして開始してください</p>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    // Set up PDF.js worker
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null;
    let convertedImages = [];
    let currentFileName = '';

    const uploadBox = document.getElementById('uploadBox');
    const selectBtn = document.getElementById('selectBtn');
    const pdfInput = document.getElementById('pdfInput');
    const controlsSection = document.getElementById('controlsSection');
    const emptyState = document.getElementById('emptyState');
    const convertBtn = document.getElementById('convertBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusArea = document.getElementById('statusArea');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const gallery = document.getElementById('gallery');
    const fileName = document.getElementById('fileName');
    const qualitySelect = document.getElementById('quality');
    const formatSelect = document.getElementById('format');
    const pagesInput = document.getElementById('pages');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const downloadAllSection = document.getElementById('downloadAllSection');
    const downloadAllBtn = document.getElementById('downloadAllBtn');

    selectBtn.addEventListener('click', () => pdfInput.click());

    pdfInput.addEventListener('change', handleFileSelect);
    uploadBox.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadBox.classList.add('dragover');
    });

    uploadBox.addEventListener('dragleave', () => {
        uploadBox.classList.remove('dragover');
    });

    uploadBox.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadBox.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            pdfInput.files = files;
            handleFileSelect();
        }
    });

    async function handleFileSelect() {
        const file = pdfInput.files[0];
        if (!file) return;

        if (file.type !== 'application/pdf') {
            showError('PDFファイルを選択してください');
            return;
        }

        currentFileName = file.name.replace('.pdf', '');
        const arrayBuffer = await file.arrayBuffer();

        try {
            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            fileName.textContent = `📄 ${file.name} (${pdfDoc.numPages} ページ)`;
            controlsSection.style.display = 'block';
            emptyState.style.display = 'none';
            uploadBox.style.display = 'none';
            convertedImages = [];
            gallery.innerHTML = '';
            downloadAllSection.style.display = 'none';
            hideMessages();
        } catch (error) {
            showError('PDFの読み込みに失敗しました: ' + error.message);
        }
    }

    convertBtn.addEventListener('click', convertPDF);

    async function convertPDF() {
        if (!pdfDoc) return;

        convertedImages = [];
        const quality = parseInt(qualitySelect.value);
        const format = formatSelect.value;
        const pagesInput_ = pagesInput.value.trim();
        let pagesToConvert = [];

        if (pagesInput_) {
            try {
                pagesToConvert = parsePagesInput(pagesInput_, pdfDoc.numPages);
            } catch (error) {
                showError('ページ範囲が無効です: ' + error.message);
                return;
            }
        } else {
            pagesToConvert = Array.from({ length: pdfDoc.numPages }, (_, i) => i + 1);
        }

        gallery.innerHTML = '';
        statusArea.classList.add('show');
        convertBtn.disabled = true;
        hideMessages();

        const scale = quality;
        const totalPages = pagesToConvert.length;

        for (let i = 0; i < totalPages; i++) {
            const pageNum = pagesToConvert[i];
            try {
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                await page.render({
                    canvasContext: context,
                    viewport: viewport
                }).promise;

                const imageData = canvas.toDataURL(`image/${format}`, format === 'jpg' ? 0.95 : 1);
                convertedImages.push({
                    page: pageNum,
                    data: imageData,
                    canvas: canvas
                });

                // Update progress
                progressFill.style.width = ((i + 1) / totalPages * 100) + '%';
                statusText.textContent = `${i + 1}/${totalPages} ページ処理中...`;

                addImageToGallery(pageNum, imageData, format);
            } catch (error) {
                console.error(`Page ${pageNum} conversion failed:`, error);
            }
        }

        statusArea.classList.remove('show');
        convertBtn.disabled = false;

        if (convertedImages.length > 0) {
            downloadAllSection.style.display = 'block';
            showSuccess(`${convertedImages.length} ページを正常に変換しました`);
        }
    }

    function parsePagesInput(input, totalPages) {
        const pages = [];
        const parts = input.split(',');

        for (let part of parts) {
            part = part.trim();
            if (part.includes('-')) {
                const [start, end] = part.split('-').map(p => parseInt(p.trim()));
                if (isNaN(start) || isNaN(end) || start < 1 || end > totalPages || start > end) {
                    throw new Error(`範囲が無効です: ${part}`);
                }
                for (let p = start; p <= end; p++) {
                    pages.push(p);
                }
            } else {
                const page = parseInt(part);
                if (isNaN(page) || page < 1 || page > totalPages) {
                    throw new Error(`ページ番号が無効です: ${page}`);
                }
                pages.push(page);
            }
        }

        return [...new Set(pages)].sort((a, b) => a - b);
    }

    function addImageToGallery(pageNum, imageData, format) {
        const item = document.createElement('div');
        item.className = 'image-item';

        const img = document.createElement('img');
        img.className = 'image-preview';
        img.src = imageData;

        const info = document.createElement('div');
        info.className = 'image-info';

        const pageInfo = document.createElement('div');
        pageInfo.className = 'page-number';
        pageInfo.textContent = `ページ ${pageNum}`;

        const sizeInfo = document.createElement('div');
        sizeInfo.className = 'image-size';
        const size = formatFileSize(imageData.length);
        sizeInfo.textContent = `${size} • ${format.toUpperCase()}`;

        const actions = document.createElement('div');
        actions.className = 'image-actions';

        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'btn-download';
        downloadBtn.textContent = 'ダウンロード';
        downloadBtn.addEventListener('click', () => downloadImage(pageNum, imageData, format));

        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn-copy';
        copyBtn.textContent = 'コピー';
        copyBtn.addEventListener('click', () => copyToClipboard(imageData, pageNum));

        actions.appendChild(downloadBtn);
        actions.appendChild(copyBtn);

        info.appendChild(pageInfo);
        info.appendChild(sizeInfo);
        info.appendChild(actions);

        item.appendChild(img);
        item.appendChild(info);
        gallery.appendChild(item);
    }

    function downloadImage(pageNum, imageData, format) {
        const link = document.createElement('a');
        link.href = imageData;
        link.download = `${currentFileName}_page_${pageNum}.${format}`;
        link.click();
    }

    async function copyToClipboard(imageData, pageNum) {
        try {
            const response = await fetch(imageData);
            const blob = await response.blob();
            await navigator.clipboard.write([
                new ClipboardItem({ [blob.type]: blob })
            ]);
            showSuccess(`ページ ${pageNum} をコピーしました`);
        } catch (error) {
            showError('コピーに失敗しました');
        }
    }

    downloadAllBtn.addEventListener('click', downloadAsZip);

    async function downloadAsZip() {
        const zip = new JSZip();
        const format = formatSelect.value;

        for (const image of convertedImages) {
            const response = await fetch(image.data);
            const blob = await response.blob();
            zip.file(`page_${String(image.page).padStart(3, '0')}.${format}`, blob);
        }

        const zipBlob = await zip.generateAsync({ type: 'blob' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipBlob);
        link.download = `${currentFileName}_pages.zip`;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    resetBtn.addEventListener('click', () => {
        pdfInput.value = '';
        pdfDoc = null;
        convertedImages = [];
        currentFileName = '';
        controlsSection.style.display = 'none';
        uploadBox.style.display = 'flex';
        emptyState.style.display = 'block';
        gallery.innerHTML = '';
        downloadAllSection.style.display = 'none';
        pagesInput.value = '';
        hideMessages();
    });

    function formatFileSize(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    function showError(message) {
        errorMessage.innerHTML = `<strong>エラー:</strong> ${message}`;
        errorMessage.style.display = 'block';
        setTimeout(() => {
            errorMessage.style.display = 'none';
        }, 5000);
    }

    function showSuccess(message) {
        successMessage.innerHTML = `<strong>成功:</strong> ${message}`;
        successMessage.style.display = 'block';
        setTimeout(() => {
            successMessage.style.display = 'none';
        }, 5000);
    }

    function hideMessages() {
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';
    }
</script>


</body>
</html>
